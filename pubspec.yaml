name: student_plus
description: Student+ ERP — MyCamu-grade campus management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # File handling
  file_picker: ^8.0.3
  url_launcher: ^6.2.6
  open_filex: ^4.3.4
  path_provider: ^2.1.3

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  image_picker: ^1.1.2
  percent_indicator: ^4.2.3
  table_calendar: ^3.1.1
  timeline_tile: ^2.0.0
  badges: ^3.1.2
  collection: ^1.18.0

  # Location / Geofencing
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
